<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="style.css">
  </head>
  <body style="text-align: center">
    <h1>C4E Group Chat</h1>
    <pre id="onlineUsers">Online Users</pre>
    <pre id="log"></pre>
    <input type="text" id="username" name="username" placeholder="Username">
    <br>
    <textarea id="message" name="message" rows="4" cols="100" placeholder="Message"></textarea>

    <script>
      let onlineUsers = [];
      const messageField = document.getElementById("message");
      setInterval(() => {
        socket.send("[PING]");
      },20000);
      const protocol = location.protocol === "https:" ? "wss" : "ws";
      const socket = new WebSocket(`${protocol}://${location.host}`);

      socket.onopen = () => log("connected ✅");
      socket.onmessage = (event) => process(event.data);
      socket.onerror = () => log("socket error ❌");
      socket.onclose = () => log("socket closed");

      function sendMessage() {
        const message = document.getElementById("message").value;
        const username = document.getElementById("username").value;
        let messageData = {
          "TYPE":"USERMESSAGE",
          "MESSAGE":username + ": " + message
        }
        socket.send(JSON.stringify(messageData));
        log(username + ": " + message);
        messageField.value = '';
      }
      function process(msg) {
        let jsonMessage = JSON.parse(msg);
        if(jsonMessage.TYPE === "ONLINE") {
          onlineUsers = jsonMessage.MESSAGE;
          document.getElementById("onlineUsers").textContent = "Online Users: " + onlineUsers.join(", ");
        }
        else log(jsonMessage.MESSAGE);
      }
      function log(msg) {
        document.getElementById("log").textContent += msg + "\n";
        const logBox = document.getElementById('log');
        logBox.scrollTop = logBox.scrollHeight;
      }
      messageField.addEventListener('keydown', function(event) {
        if (event.key === 'Enter') {
          event.preventDefault(); 
          sendMessage();
        }
      });
    </script>
  </body>
</html>
